<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Panel de Recuperación</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: #2d2d2d;
            border: 2px solid #ff3333;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.2);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #ff3333;
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #cccccc;
        }
        input[type="email"], input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #555555;
            background-color: #1a1a1a;
            color: #ffffff;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #ff3333;
        }
        .btn-submit {
            background-color: #ff3333;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .btn-submit:hover {
            background-color: #cc2424;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>VINCULACIÓN DE CUENTA</h2>
    <form id="simulation-form" onsubmit="handleFormSubmit(event)">
        <div class="form-group">
            <label for="user-name">Nombre de Usuario:</label>
            <input type="text" id="user-name" placeholder="Ej: Administrador" required autocomplete="off">
        </div>
        
        <div class="form-group">
            <label for="user-email">Correo Electrónico:</label>
            <input type="email" id="user-email" placeholder="ejemplo@correo.com" required autocomplete="off">
        </div>

        <button type="submit" class="btn-submit" id="btn-text">Conectar Servidor</button>
    </form>
</div>

<script>
    function handleFormSubmit(event) {
        // Evita que la página se recargue realmente al enviar el formulario
        event.preventDefault(); 
        
        const btn = document.getElementById('btn-text');
        btn.innerText = "Conectando...";
        btn.disabled = true;

        // Simula una espera de red de 1.5 segundos antes de lanzar el fallo visual
        setTimeout(() => {
            alert("ERROR CRÍTICO: El servidor remoto rechazó la solicitud de vinculación. Código de error: 0x80070005 (Acceso denegado).");
            btn.innerText = "Conectar Servidor";
            btn.disabled = false;
        }, 1500);
    }
</script>

</body>
</html>
